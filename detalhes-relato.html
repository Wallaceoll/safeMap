<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detalhes do Relato - safeMap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/detalhes.css">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <button class="back-btn" onclick="history.back()"><i data-lucide="arrow-left" size="24"></i></button>
            <h1>Detalhes do Relato</h1>
            <p>Confira o que foi relatado neste local</p>
        </header>

        <main class="detail-container" id="reports-list"></main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <div class="nav-icon-wrapper"><i data-lucide="map-pin"></i></div>
                <span>Mapa</span>
            </a>
            <a href="relatar.html" class="nav-item">
                <div class="nav-icon-wrapper"><i data-lucide="plus-circle"></i></div>
                <span>Relatar</span>
            </a>
            <a href="apoio.html" class="nav-item">
                <div class="nav-icon-wrapper"><i data-lucide="handshake"></i></div>
                <span>Apoio</span>
            </a>
        </nav>
    </div>

    <script>
        function renderReports() {
            const container = document.getElementById('reports-list');
            const rawData = localStorage.getItem('currentDetailReports');

            if (!rawData) {
                container.innerHTML = '<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:60vh; color:#9CA3AF;"><i data-lucide="info" size="48" style="margin-bottom:16px; opacity:0.5;"></i><p>Nenhum detalhe encontrado.</p></div>';
                lucide.createIcons();
                return;
            }

            let reports = JSON.parse(rawData);
            if (!Array.isArray(reports)) reports = [reports];

            reports.reverse();

            container.innerHTML = '';

            const scrollContent = document.createElement('div');
            scrollContent.style.paddingBottom = '40px';

            reports.forEach((report, index) => {
                const card = document.createElement('div');
                card.className = 'report-card';

                const typeLabel = report.typeName || "Ocorrência";

                let timeAgo = 'Recente';
                let dateFull = 'Data não informada';
                let periodIcon = 'sun';
                let periodColor = '#F59E0B'; // Yellow/Orange
                let periodText = 'Período diurno';

                if (report.date) {
                    const now = new Date();
                    const reportDate = new Date(report.date);
                    const diffMs = now - reportDate;
                    const diffMins = Math.floor(diffMs / 60000);
                    const diffHours = Math.floor(diffMins / 60);

                    if (diffHours > 0) timeAgo = `Há ${diffHours} ${diffHours === 1 ? 'hora' : 'horas'}`;
                    else if (diffMins > 0) timeAgo = `Há ${diffMins} ${diffMins === 1 ? 'minuto' : 'minutos'}`;
                    else timeAgo = 'Agora mesmo';

                    dateFull = reportDate.toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' });
                    dateFull += ` às ${reportDate.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`;

                    const hours = reportDate.getHours();
                    if (hours < 6 || hours >= 18) {
                        periodIcon = 'moon';
                        periodColor = '#6366F1'; // Indigo/Purple
                        periodText = 'Período noturno';
                    }
                }

                const isWarning = report.type === 'warning';
                const badgeStyle = isWarning ? 'background-color: #FEF3C7; color: #D97706;' : 'background-color: #FEE2E2; color: #EF4444;';

                const description = report.description && report.description.trim() !== ""
                    ? report.description
                    : "O usuário preferiu não descrever o ocorrido.";

                card.innerHTML = `
                    <div class="card-header">
                        <span class="type-badge" style="${badgeStyle}">${typeLabel}</span>
                        <div style="display: flex; align-items: center; gap: 6px; color: var(--text-muted);">
                            <i data-lucide="${periodIcon}" size="16" style="color: ${periodColor};" title="${periodText}"></i>
                            <span class="time-ago">${timeAgo}</span>
                        </div>
                    </div>

                    <h2 class="report-title">Ocorrência em ${report.address}</h2>
                    
                    <p class="report-description">${description}</p>

                    <div class="report-meta">
                        <div class="meta-item">
                            <div class="meta-icon-wrapper">
                                <i data-lucide="map-pin" size="18"></i>
                            </div>
                            <span>${report.address}</span>
                        </div>
                        <div class="meta-item">
                            <div class="meta-icon-wrapper">
                                <i data-lucide="calendar" size="18"></i>
                            </div>
                            <span>${dateFull}</span>
                        </div>
                        <div class="meta-item">
                            <div class="meta-icon-wrapper">
                                <i data-lucide="users" size="18"></i>
                            </div>
                            <span>Público afetado: ${
                                Array.isArray(report.targetGroup)
                                ? report.targetGroup.map(g => g === 'women' ? 'Mulheres' : 'LGBTQ+').join(' e ')
                                : (report.targetGroup === 'women' ? 'Mulheres' : 'LGBTQ+')
                            }</span>
                        </div>
                    </div>
                `;
                scrollContent.appendChild(card);
            });

            container.appendChild(scrollContent);

            lucide.createIcons();
        }

        renderReports();

        // Bloqueia acesso ao relatar se não estiver logado
        const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
        document.querySelector('a[href="relatar.html"]')?.addEventListener('click', (e) => {
            if (!isLoggedIn) {
                e.preventDefault();
                window.location.href = 'login.html';
            }
        });
    </script>
</body>

</html>
