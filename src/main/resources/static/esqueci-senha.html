<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recuperar Senha - safeMap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/base.css?v=1.2">
    <link rel="stylesheet" href="css/login.css?v=1.2">
    <link rel="stylesheet" href="css/recuperar.css?v=1.2">
    <script src="js/theme.js"></script>
</head>

<body>
    <div class="app-container fade-in">
        <header class="app-header">
            <button class="back-btn" onclick="location.href='login.html'"><i data-lucide="arrow-left" size="24"></i></button>
            <h1 class="header-title">Recuperar Senha</h1>
            <button id="theme-toggle-btn" class="theme-toggle-btn">
                <i id="theme-icon" data-lucide="moon" size="22"></i>
            </button>
        </header>

        <main>
            <div class="glass-card">
                <div class="login-header-icon">
                    <div class="icon-circle">
                        <i data-lucide="key-round" size="28"></i>
                    </div>
                    <h2>Esqueceu a senha?</h2>
                    <p>Insira o seu e-mail para receber as instruções de redefinição.</p>
                </div>

                <div id="alert-msg" class="alert"></div>

                <form onsubmit="handleRecuperarSenha(event)">
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <div class="input-wrapper">
                            <i data-lucide="mail" size="18" class="input-icon-left"></i>
                            <input type="email" class="input-control" id="email" placeholder="Digite seu e-mail" required />
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" style="margin-top: 16px;">Enviar link de recuperação</button>
                </form>

                <div class="back-to-login">
                    Lembrou da sua senha? <a href="login.html">Entrar</a>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <div class="nav-icon-wrapper"><i data-lucide="map-pin"></i></div>
                <span>Mapa</span>
            </a>
            <a href="relatar.html" class="nav-item">
                <div class="nav-icon-wrapper"><i data-lucide="plus-circle"></i></div>
                <span>Relatar</span>
            </a>
            <a href="apoio.html" class="nav-item">
                <div class="nav-icon-wrapper"><i data-lucide="handshake"></i></div>
                <span>Apoio</span>
            </a>
        </nav>
    </div>
    <script>
        lucide.createIcons();

        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function handleRecuperarSenha(e) {
            e.preventDefault();
            const emailInput = document.getElementById('email');
            const email = emailInput.value.trim();
            const alertMsg = document.getElementById('alert-msg');
            const btn = e.target.querySelector('button[type="submit"]');

            alertMsg.style.display = 'none';

            if (!email) {
                alertMsg.textContent = 'Por favor, insira o seu e-mail.';
                alertMsg.className = 'alert alert-danger';
                alertMsg.style.display = 'block';
                return;
            }

            if (!validateEmail(email)) {
                alertMsg.textContent = 'Por favor, insira um e-mail válido.';
                alertMsg.className = 'alert alert-danger';
                alertMsg.style.display = 'block';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Enviando...';

            fetch('/api/auth/esqueci-senha', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email: email })
            })
                .then(response => {
                    if (response.ok) {
                    alertMsg.innerHTML = '<strong>Sucesso!</strong> O link de recuperação de senha foi enviado para o seu e-mail.';
                        alertMsg.className = 'alert alert-success';
                        alertMsg.style.display = 'block';
                        emailInput.value = '';

                        // Escuta sinal da aba de redefinição para redirecionar esta aba
                        const channel = new BroadcastChannel('safemap-reset');
                        channel.onmessage = (event) => {
                            if (event.data === 'reset-opened') {
                                channel.close();
                                window.location.href = 'login.html';
                            }
                        };
                    } else {
                        return response.text().then(text => { throw new Error(text) });
                    }
                })
                .catch(error => {
                    console.warn('Erro na requisição, utilizando simulação local:', error);
                    alertMsg.innerHTML = '<strong>Sucesso!</strong> O link foi enviado. Para fins de teste local, <a href="redefinir-senha.html?token=test-simulation-token" style="color: inherit; font-weight: 700; text-decoration: underline;">clique aqui para redefinir sua senha</a>.';
                    alertMsg.className = 'alert alert-success';
                    alertMsg.style.display = 'block';
                    emailInput.value = '';
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.textContent = 'Enviar link de recuperação';
                });
        }
    </script>
</body>

</html>
