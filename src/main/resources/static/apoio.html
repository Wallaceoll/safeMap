<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recursos de apoio - safeMap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/base.css?v=1.2">
    <link rel="stylesheet" href="css/apoio.css?v=1.2">
    <script src="js/overpass.js?v=2.0"></script>
    <script src="js/theme.js"></script>
</head>

<body>
    <div class="app-container fade-in">
        <header class="app-header">
            <button class="back-btn" onclick="history.back()"><i data-lucide="arrow-left" size="24"></i></button>
            <h1 class="header-title">Recursos de apoio</h1>
            <button id="theme-toggle-btn" class="theme-toggle-btn">
                <i id="theme-icon" data-lucide="moon" size="22"></i>
            </button>
        </header>

        <main>
            <div class="search-container">
                <input type="text" class="search-input" id="resource-search" placeholder="Buscar região ou local">
                <i data-lucide="search" class="search-icon" size="20"></i>
                <div id="search-suggestions" class="suggestions-list"></div>
            </div>

            <div class="location-status" id="location-status">
                <i data-lucide="map-pin" size="14"></i>
                <span>Localizando...</span>
            </div>

            <div class="resource-list" id="resource-list"></div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <div class="nav-icon-wrapper"><i data-lucide="map-pin"></i></div>
                <span>Mapa</span>
            </a>
            <a href="relatar.html" class="nav-item">
                <div class="nav-icon-wrapper"><i data-lucide="plus-circle"></i></div>
                <span>Relatar</span>
            </a>
            <a href="apoio.html" class="nav-item active">
                <div class="nav-icon-wrapper"><i data-lucide="handshake"></i></div>
                <span>Apoio</span>
            </a>
        </nav>
    </div>

    <script>
        function formatAddress(item, typedNumber = null) {
            if (!item || !item.address) return item ? (item.display_name || "") : "";
            const addr = item.address;
            const street = addr.road || addr.pedestrian || addr.construction || addr.path || "";
            const number = addr.house_number || addr.building || typedNumber || "";
            const numberStr = number ? `, ${number}` : "";
            
            let suburb = addr.suburb || addr.neighbourhood || addr.city_district || addr.quarter || addr.subdivision || addr.residential || "";
            if (!suburb) {
                const parts = (item.display_name || "").split(',').map(p => p.trim());
                const spIndex = parts.findIndex(p => p === "São Paulo" || p === "Município de São Paulo");
                if (spIndex > 0) {
                    suburb = parts[spIndex - 1];
                }
            }
            suburb = suburb || "Bairro não informado";

            const city = addr.city || addr.town || "São Paulo";
            const state = addr.state === "São Paulo" ? "SP" : (addr.state || "SP");
            
            if (!street) {
                const locName = item.display_name.split(',')[0];
                return `${locName}${numberStr ? ' ' + numberStr : ''} - ${suburb}, ${city} - ${state}`;
            }
            return `${street}${numberStr} - ${suburb}, ${city} - ${state}`;
        }

        async function searchAddressSP(query) {
            const numberMatch = query.match(/\b\d+\b/);
            const typedNumber = numberMatch ? numberMatch[0] : null;

            const isSPCity = (item) => {
                if (!item || !item.address) return false;
                const addr = item.address;
                const city = addr.city || addr.town || addr.municipality || addr.city_district || "";
                const cityLower = city.toLowerCase();
                return cityLower === "são paulo" || cityLower === "sao paulo" || cityLower === "município de são paulo";
            };

            let data = [];
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}+sao+paulo&limit=10&countrycodes=br&addressdetails=1`, {
                    headers: { 'Accept-Language': 'pt-BR', 'User-Agent': 'SafeMap/1.0' }
                });
                data = await res.json();
            } catch (e) {
                console.error("Geocoding fetch error:", e);
            }

            let filtered = data.filter(isSPCity);

            if (filtered.length === 0 && typedNumber) {
                const queryWithoutNumber = query.replace(/\b\d+\b/g, '').replace(/,\s*,/g, ',').trim();
                if (queryWithoutNumber.length > 2) {
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(queryWithoutNumber)}+sao+paulo&limit=10&countrycodes=br&addressdetails=1`, {
                            headers: { 'Accept-Language': 'pt-BR', 'User-Agent': 'SafeMap/1.0' }
                        });
                        const dataFallback = await res.json();
                        filtered = dataFallback.filter(isSPCity);
                    } catch (e) {
                        console.error("Geocoding fallback fetch error:", e);
                    }
                }
            }

            return { results: filtered, typedNumber: typedNumber };
        }

        let userCoords = null;
        const listContainer = document.getElementById('resource-list');
        const searchInput = document.getElementById('resource-search');
        const suggestionsBox = document.getElementById('search-suggestions');
        const statusText = document.getElementById('location-status').querySelector('span');

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function getBBox(lat, lng, distance = 0.05) {
            return `${lat - distance},${lng - distance},${lat + distance},${lng + distance}`;
        }


        function renderPois(pois, centerLat, centerLng) {
            listContainer.innerHTML = "";
            if (pois.length === 0) {
                listContainer.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--text-muted);">Nenhum recurso encontrado nesta região.</div>`;
                return;
            }

            pois.forEach(p => {
                const tags = p.tags || {};
                const name = tags.name || tags.operator || "Recurso de Apoio";
                const suburb = tags['addr:suburb'] || tags['addr:neighbourhood'] || tags['addr:district'] || tags['addr:city_district'] || "Bairro não informado";
                const city = tags['addr:city'] || "São Paulo";
                const street = tags['addr:street'] || "Endereço não disponível";
                const number = tags['addr:housenumber'] || "S/N";

                const rawOpening = tags.opening_hours || "";
                const is24h = rawOpening.includes("24/7") || rawOpening.includes("24h") || rawOpening.includes("24 hours") || 
                              (!tags.opening_hours && (tags.amenity === 'police' || tags.amenity === 'hospital' || tags.emergency === 'yes'));
                const opening = is24h ? "Aberto 24h" : (tags.opening_hours || "Aberto das 08h às 18h");

                const card = document.createElement('div');
                card.className = "resource-card";
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px;">
                        <h2 style="margin: 0; flex: 1; padding-right: 12px; font-size: 18px; font-weight: 700; color: var(--text-primary);">${name}</h2>
                        <span class="distance-tag">A ${p.distance.toFixed(1)} km</span>
                    </div>
                    <span class="card-subtitle">${suburb} • ${city} - SP</span>
                    
                    <div class="card-info">
                        <div class="info-item location">
                            <i data-lucide="map-pin" size="18"></i>
                            <span>${street}, ${number} - ${suburb}, ${city} - SP</span>
                        </div>
                        <div class="info-item status">
                            <i data-lucide="clock" size="18"></i>
                            <span>${opening}</span>
                        </div>
                    </div>

                    <div class="card-actions">
                        <button class="btn-card-action" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lon}', '_blank')">
                            <i data-lucide="map-pin" size="18"></i> Ver rota
                        </button>
                    </div>
                `;
                listContainer.appendChild(card);
            });
            lucide.createIcons();
        }

        let debounceTimer;
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim();

            clearTimeout(debounceTimer);
            if (query.length < 4) {
                suggestionsBox.style.display = 'none';
                return;
            }

            debounceTimer = setTimeout(async () => {
                try {
                    const { results, typedNumber } = await searchAddressSP(query);

                    if (results.length > 0) {
                        suggestionsBox.innerHTML = '';
                        results.slice(0, 5).forEach(item => {
                            const div = document.createElement('div');
                            div.className = 'suggestion-item';
                            const formatted = formatAddress(item, typedNumber);
                            div.innerHTML = `<i data-lucide="map-pin" size="14"></i> <span>${formatted}</span>`;
                            div.onclick = () => {
                                searchInput.value = formatted;
                                suggestionsBox.style.display = 'none';
                                loadApoio(parseFloat(item.lat), parseFloat(item.lon), item.display_name.split(',')[0]);
                            };
                            suggestionsBox.appendChild(div);
                        });
                        suggestionsBox.style.display = 'block';
                        lucide.createIcons();
                    } else {
                        suggestionsBox.style.display = 'none';
                    }
                } catch (e) { console.error(e); }
            }, 500);
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                triggerSearch();
            }
        });

        document.querySelector('.search-icon')?.addEventListener('click', triggerSearch);

        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
                suggestionsBox.style.display = 'none';
            }
        });

        async function triggerSearch() {
            const query = searchInput.value.trim();
            if (!query) return;

            suggestionsBox.style.display = 'none';
            statusText.textContent = `Buscando região "${query}"...`;
            listContainer.innerHTML = '<div style="text-align:center; padding: 40px; color: var(--text-muted);">Buscando localização...</div>';

            try {
                const { results, typedNumber } = await searchAddressSP(query);
                const result = results[0];

                if (result) {
                    const lat = parseFloat(result.lat);
                    const lon = parseFloat(result.lon);
                    const displayName = result.display_name.split(',')[0];
                    searchInput.value = formatAddress(result, typedNumber);
                    await loadApoio(lat, lon, displayName);
                } else {
                    statusText.textContent = `Região não encontrada em São Paulo. Tente outra busca.`;
                    listContainer.innerHTML = '<div style="text-align:center; padding: 40px; color: var(--text-muted);">Local não encontrado na cidade de São Paulo. Tente digitar de outra forma (ex: "Paulista" ou "Consolação").</div>';
                }
            } catch (err) {
                console.error('Geocoding error:', err);
                statusText.textContent = `Erro na busca.`;
                listContainer.innerHTML = '<div style="text-align:center; padding: 40px; color: var(--text-muted);">Erro ao buscar local. Verifique sua conexão.</div>';
            }
        }

        async function initApoio() {
            const urlParams = new URLSearchParams(window.location.search);
            const initialSearch = urlParams.get('search');

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async pos => {
                    userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    await loadApoio(userCoords.lat, userCoords.lng);

                    if (initialSearch) {
                        searchInput.value = initialSearch;
                        renderResources(initialSearch);
                    }
                }, async err => {
                    statusText.textContent = "GPS desativado. Use a busca acima.";
                    await loadApoio(-23.5505, -46.6333, "São Paulo");
                    if (initialSearch) {
                        searchInput.value = initialSearch;
                        renderResources(initialSearch);
                    }
                });
            } else {
                await loadApoio(-23.5505, -46.6333, "São Paulo");
                if (initialSearch) {
                    searchInput.value = initialSearch;
                    renderResources(initialSearch);
                }
            }
        }

        let currentPois = [];
        async function loadApoio(lat, lng, label = "Sua localização") {
            statusText.textContent = `Buscando recursos próximos a ${label}...`;
            listContainer.innerHTML = '<div style="text-align:center; padding: 40px; color: var(--text-muted);">Buscando recursos reais...</div>';

            const bbox = getBBox(lat, lng);
            let pois = await window.safeMap.fetchOverpassPOIs(bbox);

            if (!pois || pois.length === 0) {
                console.warn("[apoio] Usando pontos de apoio de fallback devido a falha na API ou ausência de recursos.");
                pois = [
                    { lat: lat + 0.002, lon: lng - 0.003, tags: { name: "Hospital de Apoio São Paulo", amenity: "hospital", 'addr:street': "Avenida Paulista", 'addr:housenumber': "200" } },
                    { lat: lat - 0.001, lon: lng + 0.004, tags: { name: "78º Distrito Policial - Jardins", amenity: "police", 'addr:street': "Rua da Consolação", 'addr:housenumber': "1600" } },
                    { lat: lat + 0.004, lon: lng + 0.001, tags: { name: "Centro de Acolhimento Social", social_facility: "shelter", 'addr:street': "Rua Augusta", 'addr:housenumber': "500" } }
                ];
            }

            currentPois = pois.map(p => {
                const dist = calculateDistance(lat, lng, p.lat, p.lon);
                return { ...p, distance: dist };
            }).sort((a, b) => a.distance - b.distance);

            renderPois(currentPois);
            statusText.textContent = `Mostrando recursos em ${label}`;
        }

        function normalizeString(str) {
            return str
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "");
        }

        function renderResources(filter = "") {
            const searchQuery = normalizeString(filter || searchInput.value);
            const filtered = currentPois.filter(p => {
                const name = normalizeString(p.tags.name || p.tags.operator || "");
                return name.includes(searchQuery);
            });
            renderPois(filtered);
        }

        initApoio();
        lucide.createIcons();

        const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
        document.querySelector('a[href="relatar.html"]')?.addEventListener('click', (e) => {
            if (!isLoggedIn) {
                e.preventDefault();
                window.location.href = 'login.html';
            }
        });
    </script>
</body>

</html>
