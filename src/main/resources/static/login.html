<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - safeMap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="app-container fade-in">
        <header class="app-header">
            <button class="back-btn" onclick="history.back()"><i data-lucide="arrow-left" size="24"></i></button>
            <h1 class="header-title">Login</h1>
        </header>
        <div class="header-divider"></div>

        <main>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" class="input-control" id="email" placeholder="Digite seu e-mail">
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <div class="input-wrapper">
                        <input type="password" class="input-control" id="password" placeholder="Digite sua senha">
                        <button type="button" class="toggle-password" onclick="togglePassword('password', this)">
                            <i data-lucide="eye" size="20"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember-me">
                        Lembrar de mim
                    </label>
                    <a href="#" class="forgot-password">Esqueci minha senha</a>
                </div>

                <button type="submit" class="btn-primary">Entrar</button>
            </form>

            <div style="text-align: center; margin-bottom: 32px;">
                <p style="font-size: 14px; color: #6B7280;">Não tem uma conta? <a href="cadastro.html" style="color: var(--primary-purple); font-weight: 700; text-decoration: none;">Cadastre-se</a></p>
            </div>

            <div class="divider">ou continue como</div>

            <div class="visitor-mode-card">
                <div class="visitor-mode-header">
                    <i data-lucide="user-round" size="24"></i>
                    <h2>Modo visitante</h2>
                </div>
                <p>Use o mapa para consultar ocorrências e locais de apoio.</p>
                <a href="index.html" class="btn-outline">Continuar como visitante</a>
            </div>

            <div class="security-badge">
                <i data-lucide="shield-check" size="16"></i>
                <span>Seus dados estão protegidos com criptografia de ponta a ponta</span>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <div class="nav-icon-wrapper"><i data-lucide="map-pin"></i></div>
                <span>Mapa</span>
            </a>
            <a href="relatar.html" class="nav-item">
                <div class="nav-icon-wrapper"><i data-lucide="plus-circle"></i></div>
                <span>Relatar</span>
            </a>
            <a href="apoio.html" class="nav-item">
                <div class="nav-icon-wrapper"><i data-lucide="handshake"></i></div>
                <span>Apoio</span>
            </a>
        </nav>
    </div>
    <script>
        lucide.createIcons();
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            btn.innerHTML = `<i data-lucide="${isPassword ? 'eye' : 'eye-off'}" size="20"></i>`;
            lucide.createIcons();
        }

        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function handleLogin(e) {
            e.preventDefault();
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const rememberMe = document.getElementById('remember-me');
            
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!email || !password) {
                alert('Por favor, preencha o e-mail e a senha.');
                return;
            }

            if (!validateEmail(email)) {
                alert('Por favor, insira um e-mail válido (ex: usuario@dominio.com).');
                return;
            }
            
            if (rememberMe.checked) {
                localStorage.setItem('rememberedEmail', email);
                localStorage.setItem('rememberMe', 'true');
            } else {
                localStorage.removeItem('rememberedEmail');
                localStorage.removeItem('rememberMe');
            }
            
            localStorage.setItem('isLoggedIn', 'true');
            location.href = 'index.html';
        }

        // Auto-fill email if remembered
        const savedEmail = localStorage.getItem('rememberedEmail');
        const wasRemembered = localStorage.getItem('rememberMe') === 'true';
        if (savedEmail && wasRemembered) {
            document.getElementById('email').value = savedEmail;
            document.getElementById('remember-me').checked = true;
        }
    </script>
</body>
</html>
