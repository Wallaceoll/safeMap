<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cadastro - safeMap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/base.css?v=1.2">
    <link rel="stylesheet" href="css/cadastro.css?v=1.2">
    <script src="js/theme.js"></script>
</head>

<body>
    <div class="app-container fade-in">
        <header class="app-header">
            <button class="back-btn" onclick="history.back()"><i data-lucide="arrow-left" size="24"></i></button>
            <h1 class="header-title">Criar Conta</h1>
            <button id="theme-toggle-btn" class="theme-toggle-btn">
                <i id="theme-icon" data-lucide="moon" size="22"></i>
            </button>
        </header>

        <main>
            <div class="glass-card">
                <div class="cadastro-header-icon">
                    <div class="icon-circle">
                        <i data-lucide="user-plus" size="28"></i>
                    </div>
                    <h2>Junte-se à comunidade</h2>
                    <p>Relate ocorrências e torne as ruas mais seguras para todos.</p>
                </div>

                <form onsubmit="handleCadastro(event)">
                    <div class="form-group">
                        <label>Nome completo</label>
                        <div class="input-wrapper">
                            <i data-lucide="user" size="18" class="input-icon-left"></i>
                            <input type="text" class="input-control" id="name" placeholder="Digite seu nome">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>E-mail</label>
                        <div class="input-wrapper">
                            <i data-lucide="mail" size="18" class="input-icon-left"></i>
                            <input type="email" class="input-control" id="email" placeholder="Digite seu e-mail">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Telefone (opcional)</label>
                        <div class="input-wrapper">
                            <i data-lucide="phone" size="18" class="input-icon-left"></i>
                            <input type="tel" class="input-control" id="telefone" placeholder="(DD) XXXXX-XXXX">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Senha</label>
                        <div class="input-wrapper">
                            <i data-lucide="lock" size="18" class="input-icon-left"></i>
                            <input type="password" class="input-control" id="password" placeholder="Crie uma senha forte">
                            <button type="button" class="toggle-password" onclick="togglePassword('password', this)">
                                <i data-lucide="eye-off" size="20"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Confirmar Senha</label>
                        <div class="input-wrapper">
                            <i data-lucide="shield-check" size="18" class="input-icon-left"></i>
                            <input type="password" class="input-control" id="confirm-password" placeholder="Repita a senha">
                            <button type="button" class="toggle-password" onclick="togglePassword('confirm-password', this)">
                                <i data-lucide="eye-off" size="20"></i>
                            </button>
                        </div>
                    </div>

                    <div class="checkbox-container">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">Li e concordo com os <a href="#">Termos de Uso</a> e <a href="#">Política de Privacidade</a>.</label>
                    </div>

                    <button type="submit" class="btn-primary">Criar minha conta</button>
                </form>

                <div class="login-link">
                    Já tem uma conta? <a href="login.html">Fazer login</a>
                </div>
            </div>
            
            <div class="security-badge">
                <i data-lucide="lock" size="16"></i>
                <span>Seus dados não serão compartilhados com terceiros</span>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script>
        lucide.createIcons();

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            btn.innerHTML = `<i data-lucide="${input.type === 'text' ? 'eye' : 'eye-off'}" size="20"></i>`;
            lucide.createIcons();
        }

        async function handleCadastro(e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const telefone = document.getElementById('telefone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const terms = document.getElementById('terms').checked;
            const btn = e.target.querySelector('button[type="submit"]');

            if (!name || !email || !password || !confirmPassword) {
                alert('Preencha todos os campos obrigatórios.'); return;
            }
            if (password !== confirmPassword) {
                alert('As senhas não coincidem.'); return;
            }
            if (!terms) {
                alert('Você precisa aceitar os termos.'); return;
            }

            btn.disabled = true;
            btn.textContent = 'Criando conta...';

            try {
                await smCadastrar(name, email, password, confirmPassword, telefone);
                alert('Conta criada com sucesso!');
                location.href = 'index.html';
            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btn.textContent = 'Criar minha conta';
            }
        }
    </script>
</body>

</html>
