<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cadastro - safeMap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/cadastro.css">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <button class="back-btn" onclick="history.back()"><i data-lucide="arrow-left" size="24"></i></button>
            <h1 class="header-title">Cadastro</h1>
        </header>
        <div class="header-divider"></div>

        <main>
            <form onsubmit="handleCadastro(event)">
                <div class="form-group">
                    <label>Nome completo</label>
                    <input type="text" id="fullname" class="input-control" placeholder="Digite seu nome completo">
                </div>

                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="email" class="input-control" placeholder="Digite seu e-mail">
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <div class="input-wrapper">
                        <input type="password" class="input-control" id="password" placeholder="Digite sua senha">
                        <button type="button" class="toggle-password" onclick="togglePassword('password', this)">
                            <i data-lucide="eye-off" size="20"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirmar senha</label>
                    <div class="input-wrapper">
                        <input type="password" class="input-control" id="confirm_password"
                            placeholder="Confirme sua senha">
                        <button type="button" class="toggle-password"
                            onclick="togglePassword('confirm_password', this)">
                            <i data-lucide="eye-off" size="20"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Telefone (opcional)</label>
                    <input type="tel" class="input-control" placeholder="(11) 91234-5678">
                </div>

                <button type="submit" class="btn-primary">Criar conta</button>
            </form>

            <div class="login-link">
                Já tem uma conta? <a href="login.html">Entrar</a>
            </div>

            <div style="text-align: center; margin-top: 40px; padding: 0 20px;">
                <p style="font-size: 12px; color: #9CA3AF; line-height: 1.6;">
                    Ao criar uma conta, você concorda com nossos <a href="#"
                        style="color: #6B7280; text-decoration: underline;">Termos de Uso</a> e <a href="#"
                        style="color: #6B7280; text-decoration: underline;">Política de Privacidade</a>.
                </p>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <div class="nav-icon-wrapper"><i data-lucide="map-pin"></i></div>
                <span>Mapa</span>
            </a>
            <a href="relatar.html" class="nav-item">
                <div class="nav-icon-wrapper"><i data-lucide="plus-circle"></i></div>
                <span>Relatar</span>
            </a>
            <a href="apoio.html" class="nav-item">
                <div class="nav-icon-wrapper"><i data-lucide="handshake"></i></div>
                <span>Apoio</span>
            </a>
        </nav>
    </div>
    <script>
        lucide.createIcons();
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            btn.innerHTML = `<i data-lucide="${isPassword ? 'eye' : 'eye-off'}" size="20"></i>`;
            lucide.createIcons();
        }

        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function handleCadastro(e) {
            e.preventDefault();
            const name = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            if (!name || !email || !password || !confirmPassword) {
                alert('Por favor, preencha todos os campos obrigatórios.');
                return;
            }

            if (!validateEmail(email)) {
                alert('Por favor, insira um e-mail válido (ex: usuario@dominio.com).');
                return;
            }

            if (password !== confirmPassword) {
                alert('As senhas não coincidem.');
                return;
            }

            if (password.length < 6) {
                alert('A senha deve ter pelo menos 6 caracteres.');
                return;
            }

            const userData = {
                email: email,
                password: password,
                name: name
            };
            localStorage.setItem('userData', JSON.stringify(userData));

            localStorage.setItem('isLoggedIn', 'true');
            location.href = 'index.html';
        }
    </script>
</body>

</html>
