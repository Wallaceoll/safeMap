<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recursos de apoio - safeMap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/apoio.css?v=1.2">
    <script src="js/overpass.js?v=2.0"></script>
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <button class="back-btn" onclick="history.back()"><i data-lucide="arrow-left" size="24"></i></button>
            <h1 class="header-title">Recursos de apoio</h1>
        </header>
        <div class="header-divider"></div>

        <main>
            <div class="search-container">
                <input type="text" class="search-input" id="resource-search" placeholder="Buscar região ou local">
                <i data-lucide="search" class="search-icon" size="20"></i>
                <div id="search-suggestions"
                    style="display: none; position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #E5E7EB; border-radius: 12px; margin-top: 8px; z-index: 1000; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);">
                </div>
            </div>

            <div class="location-status" id="location-status"
                style="font-size: 13px; color: #6B7280; margin-bottom: 20px; display: flex; align-items: center; gap: 8px;">
                <i data-lucide="map-pin" size="14"></i>
                <span>Localizando...</span>
            </div>

            <div class="resource-list" id="resource-list"></div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <div class="nav-icon-wrapper"><i data-lucide="map-pin"></i></div>
                <span>Mapa</span>
            </a>
            <a href="relatar.html" class="nav-item">
                <div class="nav-icon-wrapper"><i data-lucide="plus-circle"></i></div>
                <span>Relatar</span>
            </a>
            <a href="apoio.html" class="nav-item active">
                <div class="nav-icon-wrapper"><i data-lucide="handshake"></i></div>
                <span>Apoio</span>
            </a>
        </nav>
    </div>

    <script>
        let userCoords = null;
        const listContainer = document.getElementById('resource-list');
        const searchInput = document.getElementById('resource-search');
        const suggestionsBox = document.getElementById('search-suggestions');
        const statusText = document.getElementById('location-status').querySelector('span');

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function getBBox(lat, lng, distance = 0.05) {
            return `${lat - distance},${lng - distance},${lat + distance},${lng + distance}`;
        }


        function renderPois(pois, centerLat, centerLng) {
            listContainer.innerHTML = "";
            if (pois.length === 0) {
                listContainer.innerHTML = `<div style="text-align:center; padding: 40px; color: #9CA3AF;">Nenhum recurso encontrado nesta região.</div>`;
                return;
            }

            pois.forEach(p => {
                const name = p.tags.name || p.tags.operator || "Recurso de Apoio";
                const suburb = p.tags['addr:suburb'] || p.tags['addr:neighbourhood'] || "Bairro não informado";
                const city = p.tags['addr:city'] || "São Paulo";
                const street = p.tags['addr:street'] || "Endereço não disponível";
                const number = p.tags['addr:housenumber'] || "S/N";

                let opening = p.tags.opening_hours;
                if (!opening) {
                    const is24h = p.tags.amenity === 'police' || p.tags.amenity === 'hospital' || p.tags.emergency === 'yes';
                    opening = is24h ? "Aberto 24h" : "Aberto das 08h às 18h";
                }

                const card = document.createElement('div');
                card.className = "resource-card";
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px;">
                        <h2 style="margin: 0; flex: 1; padding-right: 12px;">${name}</h2>
                        <span class="distance-tag">A ${p.distance.toFixed(1)} km</span>
                    </div>
                    <span class="card-subtitle">${suburb} • ${city} - SP</span>
                    
                    <div class="card-info">
                        <div class="info-item location">
                            <i data-lucide="map-pin" size="18"></i>
                            <span>${street}, ${number} - ${suburb}, ${city} - SP</span>
                        </div>
                        <div class="info-item status">
                            <i data-lucide="clock" size="18"></i>
                            <span>${opening}</span>
                        </div>
                    </div>

                    <div class="card-actions">
                        <button class="btn-card-action" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lon}', '_blank')">
                            <i data-lucide="map-pin" size="18"></i> Ver rota
                        </button>
                    </div>
                `;
                listContainer.appendChild(card);
            });
            lucide.createIcons();
        }

        let debounceTimer;
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value;
            clearTimeout(debounceTimer);
            if (query.length < 4) {
                suggestionsBox.style.display = 'none';
                return;
            }

            debounceTimer = setTimeout(async () => {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}+sao+paulo&limit=10&countrycodes=br&addressdetails=1`);
                    const data = await res.json();
                    
                    const filtered = data.filter(item => {
                        const addr = item.address || {};
                        const city = addr.city || addr.town || addr.municipality;
                        return city === "São Paulo";
                    });

                    if (filtered.length > 0) {
                        suggestionsBox.innerHTML = '';
                        filtered.slice(0, 5).forEach(item => {
                            const div = document.createElement('div');
                            div.style.padding = '12px';
                            div.style.cursor = 'pointer';
                            div.style.borderBottom = '1px solid #EEE';
                            div.textContent = item.display_name;
                            div.onclick = () => {
                                searchInput.value = item.display_name;
                                suggestionsBox.style.display = 'none';
                                loadApoio(parseFloat(item.lat), parseFloat(item.lon), item.display_name.split(',')[0]);
                            };
                            suggestionsBox.appendChild(div);
                        });
                        suggestionsBox.style.display = 'block';
                    } else {
                        suggestionsBox.style.display = 'none';
                    }
                } catch (e) { console.error(e); }
            }, 500);
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                triggerSearch();
            }
        });

        document.querySelector('.search-icon')?.addEventListener('click', triggerSearch);

        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
                suggestionsBox.style.display = 'none';
            }
        });

        async function triggerSearch() {
            const query = searchInput.value.trim();
            if (!query) return;

            suggestionsBox.style.display = 'none';
            statusText.textContent = `Buscando região "${query}"...`;
            listContainer.innerHTML = '<div style="text-align:center; padding: 40px; color: #9CA3AF;">Buscando localização...</div>';

            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}+sao+paulo&limit=10&countrycodes=br&addressdetails=1`, {
                    headers: {
                        'Accept-Language': 'pt-BR',
                        'User-Agent': 'SafeMap/1.0'
                    }
                });
                const data = await res.json();
                
                const result = data.find(item => {
                    const addr = item.address || {};
                    const city = addr.city || addr.town || addr.municipality;
                    return city === "São Paulo";
                });

                if (result) {
                    const lat = parseFloat(result.lat);
                    const lon = parseFloat(result.lon);
                    const displayName = result.display_name.split(',')[0];
                    await loadApoio(lat, lon, displayName);
                } else {
                    statusText.textContent = `Região não encontrada em São Paulo. Tente outra busca.`;
                    listContainer.innerHTML = '<div style="text-align:center; padding: 40px; color: #9CA3AF;">Local não encontrado na cidade de São Paulo. Tente digitar de outra forma (ex: "Paulista" ou "Consolação").</div>';
                }
            } catch (err) {
                console.error('Geocoding error:', err);
                statusText.textContent = `Erro na busca.`;
                listContainer.innerHTML = '<div style="text-align:center; padding: 40px; color: #9CA3AF;">Erro ao buscar local. Verifique sua conexão.</div>';
            }
        }

        async function initApoio() {
            const urlParams = new URLSearchParams(window.location.search);
            const initialSearch = urlParams.get('search');
            console.log("Parâmetro de busca recebido:", initialSearch);

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async pos => {
                    userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    await loadApoio(userCoords.lat, userCoords.lng);

                    if (initialSearch) {
                        console.log("Aplicando busca inicial:", initialSearch);
                        searchInput.value = initialSearch;
                        renderResources(initialSearch);
                    }
                }, async err => {
                    statusText.textContent = "GPS desativado. Use a busca acima.";
                    await loadApoio(-23.5505, -46.6333, "São Paulo");
                    if (initialSearch) {
                        searchInput.value = initialSearch;
                        renderResources(initialSearch);
                    }
                });
            } else {
                await loadApoio(-23.5505, -46.6333, "São Paulo");
                if (initialSearch) {
                    searchInput.value = initialSearch;
                    renderResources(initialSearch);
                }
            }
        }

        let currentPois = [];
        async function loadApoio(lat, lng, label = "Sua localização") {
            statusText.textContent = `Buscando recursos próximos a ${label}...`;
            listContainer.innerHTML = '<div style="text-align:center; padding: 40px; color: #9CA3AF;">Buscando recursos reais...</div>';

            const bbox = getBBox(lat, lng);
            const pois = await window.safeMap.fetchOverpassPOIs(bbox);

            currentPois = pois.map(p => {
                const dist = calculateDistance(lat, lng, p.lat, p.lon);
                return { ...p, distance: dist };
            }).sort((a, b) => a.distance - b.distance);

            renderResources();
            statusText.textContent = `Mostrando recursos em ${label}`;
        }

        function normalizeString(str) {
            return str
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "");
        }

        function renderResources(filter = "") {
            const searchQuery = normalizeString(filter || searchInput.value);
            const filtered = currentPois.filter(p => {
                const name = normalizeString(p.tags.name || p.tags.operator || "");
                return name.includes(searchQuery);
            });
            renderPois(filtered);
        }

        initApoio();
        lucide.createIcons();

        const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
        document.querySelector('a[href="relatar.html"]')?.addEventListener('click', (e) => {
            if (!isLoggedIn) {
                e.preventDefault();
                window.location.href = 'login.html';
            }
        });
    </script>
</body>

</html>
