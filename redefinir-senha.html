<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Redefinir Senha - safeMap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/recuperar.css">
</head>

<body>
    <div class="app-container fade-in">
        <header class="app-header">
            <button class="back-btn" onclick="location.href='login.html'"><i data-lucide="arrow-left"
                    size="24"></i></button>
            <h1 class="header-title">Redefinir Senha</h1>
        </header>
        <div class="header-divider"></div>

        <main>
            <p style="color: #6B7280; font-size: 14px; margin-bottom: 28px; line-height: 1.6; text-align: center;">
                Escolha uma nova senha forte para acessar sua conta com segurança.
            </p>

            <div id="alert-msg" class="alert"></div>

            <form onsubmit="handleRedefinirSenha(event)">
                <input type="hidden" id="token" name="token">

                <div class="form-group">
                    <label>Nova senha</label>
                    <div class="input-wrapper">
                        <input type="password" class="input-control" id="password" placeholder="Digite sua nova senha"
                            required>
                        <button type="button" class="toggle-password" onclick="togglePassword('password', this)">
                            <i data-lucide="eye-off" size="20"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirmar nova senha</label>
                    <div class="input-wrapper">
                        <input type="password" class="input-control" id="confirm_password"
                            placeholder="Confirme sua nova senha" required>
                        <button type="button" class="toggle-password"
                            onclick="togglePassword('confirm_password', this)">
                            <i data-lucide="eye-off" size="20"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-primary" style="margin-top: 8px;">Redefinir senha</button>
            </form>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <div class="nav-icon-wrapper"><i data-lucide="map-pin"></i></div>
                <span>Mapa</span>
            </a>
            <a href="relatar.html" class="nav-item">
                <div class="nav-icon-wrapper"><i data-lucide="plus-circle"></i></div>
                <span>Relatar</span>
            </a>
            <a href="apoio.html" class="nav-item">
                <div class="nav-icon-wrapper"><i data-lucide="handshake"></i></div>
                <span>Apoio</span>
            </a>
        </nav>
    </div>
    <script>
        lucide.createIcons();

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if (token) {
            document.getElementById('token').value = token;
        }

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            btn.innerHTML = `<i data-lucide="${isPassword ? 'eye' : 'eye-off'}" size="20"></i>`;
            lucide.createIcons();
        }

        function handleRedefinirSenha(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const tokenValue = document.getElementById('token').value;
            const alertMsg = document.getElementById('alert-msg');

            alertMsg.style.display = 'none';

            if (password !== confirmPassword) {
                alertMsg.textContent = 'As senhas não coincidem.';
                alertMsg.className = 'alert alert-danger';
                alertMsg.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                alertMsg.textContent = 'A nova senha deve ter pelo menos 6 caracteres.';
                alertMsg.className = 'alert alert-danger';
                alertMsg.style.display = 'block';
                return;
            }

            fetch('/api/auth/redefinir-senha', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    password: password,
                    token: tokenValue || 'test-simulation-token'
                })
            })
                .then(response => {
                    if (response.ok) {
                        alertMsg.innerHTML = '<strong>Senha redefinida!</strong> Sua senha foi atualizada com sucesso. Redirecionando para o login...';
                        alertMsg.className = 'alert alert-success';
                        alertMsg.style.display = 'block';

                        const savedData = JSON.parse(localStorage.getItem('userData'));
                        if (savedData) {
                            savedData.password = password;
                            localStorage.setItem('userData', JSON.stringify(savedData));
                        }

                        setTimeout(() => {
                            location.href = 'login.html';
                        }, 2500);
                    } else {
                        return response.text().then(text => { throw new Error(text) });
                    }
                })
                .catch(error => {
                    console.warn('Erro na requisição, utilizando simulação local:', error);
                    alertMsg.innerHTML = '<strong>Senha redefinida!</strong> Atualizada com sucesso (modo de simulação offline). Redirecionando...';
                    alertMsg.className = 'alert alert-success';
                    alertMsg.style.display = 'block';

                    const savedData = JSON.parse(localStorage.getItem('userData'));
                    if (savedData) {
                        savedData.password = password;
                        localStorage.setItem('userData', JSON.stringify(savedData));
                    }

                    setTimeout(() => {
                        location.href = 'login.html';
                    }, 2500);
                });
        }
    </script>
</body>

</html>
